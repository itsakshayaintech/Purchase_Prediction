<!DOCTYPE html>
<html>
<head>
    <title>Customer Purchase Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        .container {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
        }

        .buy {
            background-color: #d4edda;
            color: #155724;
        }

        .not-buy {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Purchase Prediction Based on Ads</h2>

    <form action="/predict" method="post">
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <input type="number" name="age" placeholder="Enter Age" required>
        <input type="number" name="salary" placeholder="Estimated Salary" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <canvas id="myChart" width="300" height="300"></canvas>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    {% if probability %}
        window.onload = function() {

            const prob = {{ probability }};
            const notProb = 100 - prob;

            const canvas = document.getElementById('myChart');

            if (canvas) {
                const ctx = canvas.getContext('2d');

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Buy', 'Not Buy'],
                        datasets: [{
                            label: 'Probability (%)',
                            data: [prob, notProb],
                            backgroundColor: ['#4caf50', '#f44336']
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                grid: {
                                    display: false   // ❌ removes horizontal lines
                                }
                            },
                            x: {
                                grid: {
                                    display: false   // ❌ removes vertical lines (optional)
                                }
                            }
                        }
                    }
                });
            }
        }
    {% endif %}
</script>

</body>
</html>
