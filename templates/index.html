<!DOCTYPE html>
<html>
<head>
    <title>Customer Purchase Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        .container {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
        }

        .buy {
            background-color: #d4edda;
            color: #155724;
        }

        .not-buy {
            background-color: #f8d7da;
            color: #721c24;
        }

    </style>
</head>

<body>

    <div class="container">
        <h2>Purchase Prediction Based on Ads</h2>

        <form action="/predict" method="post">
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <input type="number" name="age" placeholder="Enter Age" required>
            <input type="number" name="salary" placeholder="Estimated Salary" required>

            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
            <div class="result 
                {% if 'NOT' in prediction_text %}
                    not-buy
                {% else %}
                    buy
                {% endif %}
            ">
                {{ prediction_text }}
            </div>
        {% endif %}

    </div>

</body>
</html>
